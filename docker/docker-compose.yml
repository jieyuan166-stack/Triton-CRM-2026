services:
  triton-crm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY}
    container_name: triton-crm
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "3000"
    ports:
      - "3001:3000"
    networks:
      - triton-net
    volumes:
      - triton-data:/app/prisma/data
      - /volume1/docker/triton-crm/backups:/app/backups
    environment:
      # Override values that should be hard-coded for the container regardless
      # of what the env file says.
      DATABASE_URL: file:/app/prisma/data/triton.db
      BACKUP_DIR: /app/backups
      # The remaining values (NEXTAUTH_SECRET, AUTH_SECRET, AUTH_URL,
      # NEXTAUTH_URL, SMTP_*, NEXT_PUBLIC_GOOGLE_MAPS_KEY, SEED_*,
      # CRON_SECRET) come from env_file: ../.env.production. We do NOT
      # list them here as ${VAR} interpolation, because docker-compose
      # variable substitution reads from the calling shell's environment
      # rather than env_file, and a missing shell var would silently
      # blank out the value (this is what wiped AUTH_SECRET on the first
      # run after the env_file refactor).
      #
      # AUTH_SECRET note: the .env.production file should set both
      # NEXTAUTH_SECRET and AUTH_SECRET (NextAuth v5 reads AUTH_SECRET
      # first). They are normally identical strings.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: triton-tunnel
    restart: unless-stopped
    # The official cloudflared image currently ships a CMD-SHELL
    # healthcheck that calls /bin/sh + wget, but this image is distroless
    # and has no shell. Leaving that inherited healthcheck enabled marks a
    # working tunnel as "unhealthy". Availability is monitored by the NAS
    # watchdog script, which checks the actual public CRM URL and restarts
    # this container if needed.
    healthcheck:
      disable: true
    # Credentials-file mode: the tunnel UUID and signing key live in
    # /etc/cloudflared/credentials.json (mode 600, only the cloudflared
    # process can read it). The companion config.yml on the host names
    # the tunnel and routes hostnames to the upstream Next.js service.
    # Token mode is gone — tokens used to leak through `docker ps` and
    # `docker inspect` because they had to be passed as a CLI arg.
    #
    # Migration: see scripts/migrate-cloudflared-to-credentials.sh.
    # Until the migration is complete, the host directory will be empty
    # and cloudflared will fail to start. That is the intended fail-fast
    # behaviour — switching modes must be a deliberate operator action.
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /volume1/docker/triton-crm/cloudflared:/etc/cloudflared:ro
    networks:
      - triton-net
    depends_on:
      triton-crm:
        condition: service_healthy

  cloudflared-backup:
    image: cloudflare/cloudflared:latest
    container_name: triton-tunnel-backup
    restart: unless-stopped
    # Secondary connector for the same Cloudflare Tunnel. Cloudflare Tunnel
    # supports multiple active connectors; if the primary connector exits or
    # is restarted, this one keeps crm.tritonwealth.ca reachable as long as
    # the NAS and Docker are running.
    healthcheck:
      disable: true
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /volume1/docker/triton-crm/cloudflared:/etc/cloudflared:ro
    networks:
      - triton-net
    depends_on:
      triton-crm:
        condition: service_healthy

networks:
  triton-net:
    driver: bridge

volumes:
  triton-data:
