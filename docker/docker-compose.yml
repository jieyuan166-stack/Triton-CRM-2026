services:
  triton-crm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY}
    container_name: triton-crm
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "3000"
    ports:
      - "3001:3000"
    networks:
      - triton-net
    volumes:
      - triton-data:/app/prisma/data
      - /volume1/docker/triton-crm/backups:/app/backups
    environment:
      # Override values that should be hard-coded for the container regardless
      # of what the env file says, plus AUTH_SECRET which is just a copy of
      # NEXTAUTH_SECRET (NextAuth v5 reads either name).
      DATABASE_URL: file:/app/prisma/data/triton.db
      AUTH_URL: ${AUTH_URL:-https://crm.tritonwealth.ca}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://crm.tritonwealth.ca}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      BACKUP_DIR: /app/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: triton-tunnel
    restart: unless-stopped
    # Credentials-file mode: the tunnel UUID and signing key live in
    # /etc/cloudflared/credentials.json (mode 600, only the cloudflared
    # process can read it). The companion config.yml on the host names
    # the tunnel and routes hostnames to the upstream Next.js service.
    # Token mode is gone — tokens used to leak through `docker ps` and
    # `docker inspect` because they had to be passed as a CLI arg.
    #
    # Migration: see scripts/migrate-cloudflared-to-credentials.sh.
    # Until the migration is complete, the host directory will be empty
    # and cloudflared will fail to start. That is the intended fail-fast
    # behaviour — switching modes must be a deliberate operator action.
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /volume1/docker/triton-crm/cloudflared:/etc/cloudflared:ro
    networks:
      - triton-net
    depends_on:
      triton-crm:
        condition: service_healthy

networks:
  triton-net:
    driver: bridge

volumes:
  triton-data:
