services:
  triton-crm-restore-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env.production
    environment:
      DATABASE_URL: file:/app/prisma/data/triton.db
      BACKUP_DIR: /app/backups
      NEXTAUTH_URL: ${RESTORE_TEST_PUBLIC_URL:-http://127.0.0.1:3002}
      AUTH_URL: ${RESTORE_TEST_PUBLIC_URL:-http://127.0.0.1:3002}
    ports:
      - "127.0.0.1:${RESTORE_TEST_PORT:-3002}:3000"
    volumes:
      - ${RESTORE_TEST_DATA_VOLUME}:/app/prisma/data
      - ${RESTORE_TEST_UPLOADS_DIR}:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
